<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">
    <div class="flex flex-col min-h-screen">
        <header class="flex items-center justify-between p-4 bg-blue-600 text-white">
            <h1 class="text-xl font-bold">Expense Tracker</h1>
            <nav>
                <button id="dashboardTab" class="px-4 py-2">Dashboard</button>
                <button id="featuresTab" class="px-4 py-2">Features</button>
                <button id="dataManagementTab" class="px-4 py-2">Data Management</button>
                <button id="reportsTab" class="px-4 py-2">Reports</button>
            </nav>
        </header>
        <main class="flex-grow p-4">
            <div id="dashboard" class="tab-content hidden">
                <h2 class="text-xl font-bold">Dashboard</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="bg-white p-4 rounded shadow">
                        <h3 class="font-bold text-blue-500">Total Records</h3>
                        <p id="totalRecords" class="text-lg"></p>
                    </div>
                    <div class="bg-white p-4 rounded shadow">
                        <h3 class="font-bold text-green-500">Present Count</h3>
                        <p id="presentCount" class="text-lg"></p>
                    </div>
                    <div class="bg-white p-4 rounded shadow">
                        <h3 class="font-bold text-red-500">Absent Count</h3>
                        <p id="absentCount" class="text-lg"></p>
                    </div>
                    <div class="bg-white p-4 rounded shadow">
                        <h3 class="font-bold">Attendance Rate</h3>
                        <p id="attendanceRate" class="text-lg"></p>
                    </div>
                </div>
            </div>
            <div id="features" class="tab-content hidden">
                <h2 class="text-xl font-bold">Features</h2>
                <p>Details about features will be here.</p>
            </div>
            <div id="dataManagement" class="tab-content hidden">
                <h2 class="text-xl font-bold">Data Management</h2>
                <p>Data management features will be here.</p>
            </div>
            <div id="reports" class="tab-content hidden">
                <h2 class="text-xl font-bold">Reports</h2>
                <p>Reports generation features will be here.</p>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
