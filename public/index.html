<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Attendance Management System</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-blue-600 p-4">
        <div class="container mx-auto flex justify-between">
            <h1 class="text-white text-2xl">SAMS</h1>
            <div>
                <button id="dashboard-tab" class="text-white mx-2">Dashboard</button>
                <button id="reports-tab" class="text-white mx-2">Reports</button>
                <button id="data-management-tab" class="text-white mx-2">Data Management</button>
            </div>
        </div>
    </nav>
    <main class="container mx-auto mt-4">
        <div id="dashboard" class="tab-content hidden">
            <h2 class="text-xl font-bold">Attendance Dashboard</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-lg">Total Records</h3>
                    <p id="totalRecords" class="text-2xl">0</p>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-lg">Present Count</h3>
                    <p id="presentCount" class="text-2xl">0</p>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-lg">Absent Count</h3>
                    <p id="absentCount" class="text-2xl">0</p>
                </div>
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="text-lg">Attendance Rate</h3>
                    <p id="attendanceRate" class="text-2xl">0%</p>
                </div>
            </div>
        </div>
        <div id="reports" class="tab-content hidden">
            <h2 class="text-xl font-bold">Reports</h2>
            <p>Reports content goes here.</p>
        </div>
        <div id="data-management" class="tab-content hidden">
            <h2 class="text-xl font-bold">Data Management</h2>
            <p>Data management content goes here.</p>
        </div>
    </main>
    <script src="/js/app.js"></script>
</body>
</html>
