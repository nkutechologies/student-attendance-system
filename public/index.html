<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Book Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-5">
        <h1 class="text-3xl font-bold mb-5 text-blue-600">Library Book Management System</h1>
        <nav>
            <div class="flex space-x-4">
                <button id="tab-dashboard" class="tab-btn py-2 px-4 rounded bg-blue-600 text-white">Dashboard</button>
                <button id="tab-books" class="tab-btn py-2 px-4 rounded bg-blue-600 text-white">Books</button>
                <button id="tab-members" class="tab-btn py-2 px-4 rounded bg-blue-600 text-white">Members</button>
                <button id="tab-reports" class="tab-btn py-2 px-4 rounded bg-blue-600 text-white">Reports</button>
            </div>
        </nav>

        <div id="content" class="mt-5">
            <div id="dashboard" class="tab-content hidden">
                <h2 class="text-xl font-semibold text-blue-600">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-5">
                    <div class="bg-white rounded-lg shadow p-4">
                        <h3 class="text-lg font-bold">Total Records</h3>
                        <p id="totalRecords" class="text-2xl text-green-600">--</p>
                    </div>
                    <div class="bg-white rounded-lg shadow p-4">
                        <h3 class="text-lg font-bold">Present</h3>
                        <p id="presentCount" class="text-2xl text-green-600">--</p>
                    </div>
                    <div class="bg-white rounded-lg shadow p-4">
                        <h3 class="text-lg font-bold">Absent</h3>
                        <p id="absentCount" class="text-2xl text-red-600">--</p>
                    </div>
                    <div class="bg-white rounded-lg shadow p-4">
                        <h3 class="text-lg font-bold">Attendance Rate</h3>
                        <p id="attendanceRate" class="text-2xl text-green-600">--</p>
                    </div>
                </div>
            </div>

            <div id="books" class="tab-content hidden">
                <h2 class="text-xl font-semibold text-blue-600">Books Management</h2>
                <!-- Books management UI to be implemented -->
            </div>

            <div id="members" class="tab-content hidden">
                <h2 class="text-xl font-semibold text-blue-600">Members Management</h2>
                <!-- Members management UI to be implemented -->
            </div>

            <div id="reports" class="tab-content hidden">
                <h2 class="text-xl font-semibold text-blue-600">Reports</h2>
                <!-- Reports UI to be implemented -->
            </div>
        </div>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
